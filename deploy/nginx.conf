# ============================================
# 二次发放审批系统 - Nginx 站点配置
# 使用方法：
#   1. 复制此文件到宝塔 Nginx 站点配置中
#   2. 替换 DOMAIN_OR_IP 为实际域名或 IP
#   3. 替换 PROJECT_PATH 为项目实际路径
# ============================================

server {
    listen 80;
    server_name DOMAIN_OR_IP;          # ← 改为你的域名或IP

    # 前端静态文件
    root PROJECT_PATH/client/build;     # ← 改为实际路径，如 /www/wwwroot/approval/client/build
    index index.html;

    # ====== 前端路由（React SPA） ======
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ====== 后端 API 反向代理 ======
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ====== 静态资源缓存 ======
    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
